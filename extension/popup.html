<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; width: 260px; padding: 12px 16px; background: #faf8f5; color: #2c2418; font-size: 13px; }
  h3 { font-size: 13px; margin: 0 0 10px; border-bottom: 2px solid #c4956a; padding-bottom: 4px; }
  .setting { margin-bottom: 12px; }
  .setting label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-weight: 600; font-size: 12px; }
  .setting label span { font-weight: 400; color: #8b6d4e; }
  input[type="range"] { width: 100%; margin: 0; accent-color: #c4956a; }
  .setting.expert input[type="range"] { accent-color: #4a7ab5; }
  .concurrency { margin-top: 8px; }
  .concurrency select { padding: 2px 4px; border: 1px solid #c4956a; border-radius: 3px; background: #fff; font-size: 12px; }
  .status-link { display: block; text-align: center; margin-top: 10px; font-size: 11px; color: #8b6d4e; text-decoration: none; }
  .status-link:hover { text-decoration: underline; }
</style>
</head>
<body>
  <h3>Summarizer Settings</h3>
  <div class="setting">
    <label>Earnings Call Verbosity <span id="ec-val">60</span></label>
    <input type="range" id="ec-verbosity" min="10" max="200" step="10" value="60">
  </div>
  <div class="setting expert">
    <label>Expert Call Verbosity <span id="ex-val">30</span></label>
    <input type="range" id="ex-verbosity" min="10" max="200" step="10" value="30">
  </div>
  <div class="setting">
    <label>YouTube Verbosity <span id="yt-val">180</span></label>
    <input type="range" id="yt-verbosity" min="10" max="200" step="10" value="180">
  </div>
  <div class="setting concurrency">
    <label>Parallel Jobs
      <select id="concurrency">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="5">5</option>
      </select>
    </label>
  </div>
  <a class="status-link" id="status-link" href="#">Open Status Page</a>
  <script src="popup.js"></script>
</body>
</html>
